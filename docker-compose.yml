version: "3.9"

services:
  db:
    image: postgres:16
    container_name: range-trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: range_trading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d range_trading"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

